apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: path4you

spec:

  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:

    metadata:
      labels:
        app: frontend

    spec:

      containers:

      - name: frontend

        image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/path4you-frontend:v1

        imagePullPolicy: Always

        ports:

        - containerPort: 80