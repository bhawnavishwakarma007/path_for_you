apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: path4you

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:

      - name: backend

        image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/path4you-backend:v1

        imagePullPolicy: Always

        ports:
        - containerPort: 5000

        envFrom:

        - configMapRef:
            name: backend-config

        - secretRef:
            name: backend-secret

        readinessProbe:
          httpGet:
            path: /health
            port: 5000

          initialDelaySeconds: 10
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 5000

          initialDelaySeconds: 30
          periodSeconds: 15